name: Automatic trigger draft release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"

jobs:
  call-workflow-build-artifacts-and-run-tests:
    uses: ./.github/workflows/build-artifacts-and-run-tests.yml
    with:
      matrix_all_combinations: false
      artifact_upload_mode: with_default_features

  automated-draft-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: call-workflow-build-artifacts-and-run-tests
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: downloaded_artifacts
          pattern: ouch-*

      - name: Install AppImage dependencies
        run: sudo apt-get update && sudo apt-get install -y desktop-file-utils

      - name: Package release assets
        run: scripts/package-release-assets.sh

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release assets with cosign
        run: |
          for f in output_assets/ouch-*; do
            cosign sign-blob --yes --bundle "$f.sigstore.json" "$f"
          done

      - name: Create release
        uses: softprops/action-gh-release@v3.0.1
        with:
          draft: true
          files: output_assets/ouch-*
